      <div class="gw-pair"><div class="gw-pair-title">Motion</div><div class="gw-grid">
        <div class="gw-frame good"><span class="gw-label">${I.tick} Reducible</span><div class="gw-demo"><span class="token-motiondemo"></span><span style="font-size:11px;color:var(--rds-color-text-muted);font-family:var(--rds-font-mono)">respects reduced-motion</span></div><p>Animation is subtle and collapses when reduced motion is set.</p></div>
        <div class="gw-frame weak"><span class="gw-label">${I.x} Forced</span><div class="gw-demo"><span style="font-size:11px;color:var(--rds-color-text-muted);font-family:var(--rds-font-mono)">always animates</span></div><p>Motion that ignores the preference can cause discomfort.</p></div>
      </div></div>

      <div class="gw-pair"><div class="gw-pair-title">Loading state</div><div class="gw-grid">
        <div class="gw-frame good"><span class="gw-label">${I.tick} Clear loading</span><div class="gw-demo"><span class="rds-btn rds-btn--primary sm"><span class="spinner"></span> Saving</span></div><p>State and label change, and repeat submission is blocked.</p></div>
        <div class="gw-frame weak"><span class="gw-label">${I.x} Unclear</span><div class="gw-demo"><span class="rds-btn rds-btn--primary sm">Save changes</span></div><p>No feedback, so the user cannot tell anything is happening.</p></div>
      </div></div>

      <div class="gw-pair"><div class="gw-pair-title">Touch target</div><div class="gw-grid">
        <div class="gw-frame good"><span class="gw-label">${I.tick} Large enough</span><div class="gw-demo"><button class="rds-btn rds-btn--secondary" aria-label="Like">${I.plus}</button></div><p>Around 44px, comfortable to tap on touch devices.</p></div>
        <div class="gw-frame weak"><span class="gw-label">${I.x} Cramped</span><div class="gw-demo"><button class="rds-btn rds-btn--secondary" aria-label="Like" style="min-height:22px;padding:3px 5px">${I.plus}</button></div><p>Too small to tap reliably, easy to miss or mis-tap.</p></div>
      </div></div>
    </section>


    <section class="section">
      <div class="eyebrow">Copyable accessibility checklist</div>
      <h2 class="section-title">Run this before you ship.</h2>
      <p class="section-intro">Tap each item to mark it done, or copy the whole list to paste into a PR, a ticket, or an AI prompt.</p>
      <div style="margin-bottom:var(--rds-space-4)">
        <button class="rds-btn rds-btn--secondary sm" data-copy="RDS accessibility checklist:
- Text meets contrast expectations.
- Keyboard navigation works.
- Focus states are visible.
- Form labels remain visible.
- Errors are descriptive.
- Icons are supported by labels or accessible names.
- Touch targets are large enough.
- Motion is purposeful and reducible.
- Loading states are communicated.
- Destructive actions have confirmation where needed." data-toast="Checklist copied">${I.copy}<span>Copy checklist</span></button>
      </div>
      <ul class="checklist">
        ${[
          'Text meets contrast expectations.',
          'Keyboard navigation works.',
          'Focus states are visible.',
          'Form labels remain visible.',
          'Errors are descriptive.',
          'Icons are supported by labels or accessible names.',
          'Touch targets are large enough.',
          'Motion is purposeful and reducible.',
          'Loading states are communicated.',
          'Destructive actions have confirmation where needed.',
        ].map(x => `<li><span class="box">${I.checkW}</span><span>${x}</span></li>`).join('')}
      </ul>
      <div class="card" style="margin-top:var(--rds-space-5);background:var(--rds-color-text-primary);color:var(--rds-color-background-default);border:none">
        <p style="font-family:var(--rds-font-serif);font-size:16px;color:var(--rds-color-background-default)">Use this checklist before shipping screens, components, or AI generated UI.</p>
      </div>
    </section>
  </div>`;
}

function pageRoadmap() {
  const stages = [
    { stage:'now', label:'Now', ver:'RDS v0.1', current:true,
      focus:'Product structure, foundations, tokens, Button documentation, accessibility baseline, roadmap, and changelog.',
      why:'This proves the system foundation before expanding into more components.',
      items:['Overview','Getting Started','Foundations','Design Tokens','Button','Accessibility','Roadmap','Changelog'] },
    { stage:'next', label:'Next', ver:'RDS v1.0', current:false,
      focus:'Core component library, Figma-ready library structure, stronger accessibility documentation, pattern library, starter examples, and public contribution guidelines.',
      why:'This turns RDS from a documented foundation into a usable design system library.',
      items:['Input','Card','Badge','Form field','Modal','Tabs','Navigation','Contribution guide','Starter examples'] },
    { stage:'later', label:'Later', ver:'RDS v2.0', current:false,
      focus:'Industry examples, theme builder, advanced tokens, community feedback process, documentation search, and Built with RDS gallery.',
      why:'This shows how RDS can adapt across product types without becoming a random template library.',
      items:['SaaS dashboard example','Marketplace flow','Admin panel','Authentication flow','Settings page','Hospitality booking flow','Web3 wallet dashboard','EV product landing page'] },
    { stage:'future', label:'Future', ver:'RDS v3.0', current:false,
      focus:'React component library, Tailwind token package, public documentation site, contribution model, and wider adoption strategy.',
      why:'This prepares RDS for broader use beyond the initial design documentation.',
      items:['React component library','Tailwind token package','Public documentation site','Contribution model','Wider adoption strategy'] },
  ];
  return `
  <div class="page" id="page-roadmap">
    <div class="eyebrow">Roadmap</div>
    <h1 class="page-title">Depth before scale.</h1>
    <p class="lede">RDS will not chase scale before usefulness. Each version deepens the system before expanding it. The roadmap maps directly onto which components become available, so the plan is never abstract.</p>

    <section class="section">
      <div class="roadmap" style="margin-top:var(--rds-space-6)">
        ${stages.map(s => `
          <div class="rm-item ${s.current ? 'current' : ''}">
            <div class="rm-dot"></div>
            <div class="rm-ver">
              <h3>${s.ver}</h3>
              <span class="rm-stage ${s.stage}">${s.label}</span>
            </div>
            <div class="rm-focus"><b style="color:var(--rds-color-text-primary);font-weight:600">Focus.</b> ${s.focus}</div>
            <div class="rm-why">Why it matters: ${s.why}</div>
            <ul class="rm-list">${s.items.map(x => `<li>${x}</li>`).join('')}</ul>
          </div>`).join('')}
      </div>
    </section>

    <section class="section">
      <div class="card" style="background:var(--rds-color-text-primary);color:var(--rds-color-background-default);border:none;position:relative;overflow:hidden">
        <div class="grid-deco"></div>
        <div class="eyebrow" style="color:var(--rds-accent-soft)">A note on pacing</div>
        <p class="statement" style="color:var(--rds-color-background-default);max-width:42ch">RDS will not chase scale before usefulness. Each version should deepen the system before expanding it.</p>
      </div>
    </section>
  </div>`;
}

function pageChangelog() {
  const entries = [
    ['31 May 2026','v0.1.0',[
      ['added','Accessibility baseline and copyable checklist.','Helps users review interface decisions before shipping.'],
      ['added','Design Tokens page with categories, examples, and copy interactions.','Makes tokens a practical working asset, not a static reference.'],
      ['improved','Button documentation with anatomy, states, variants, pairing rules, decisions, and good and weak patterns.','Helps users make better decisions around action hierarchy and interaction behaviour.'],
    ]],
    ['24 May 2026','v0.0.9',[
      ['added','Foundation pages for colour, typography, spacing, and layout.','Gives users a clearer starting point before applying tokens or components.'],
      ['improved','Overview positioning with a product preview and Use RDS today actions.','Makes the product easier to understand within the first few seconds.'],
    ]],
    ['17 May 2026','v0.0.7',[
      ['added','Roadmap with Now, Next, Later, and Future staging.','Connects honest planning to real component availability.'],
      ['added','System identity: logo lockup, grid motif, and token-card treatment.','Gives RDS a distinct, ownable visual signature.'],
      ['fixed','Inconsistent spacing between documentation sections.','Improves scannability across long pages.'],
    ]],
    ['09 May 2026','v0.0.4',[
      ['added','Initial project structure and navigation.','Establishes the documentation shell the system grows inside.'],
      ['deprecated','Early placeholder copy in favour of outcome-based messaging.','Removes vague marketing language in favour of practical value.'],
    ]],
  ];
  const filters = [['all','All'],['added','Added'],['improved','Improved'],['fixed','Fixed'],['deprecated','Deprecated']];
  return `
  <div class="page" id="page-changelog">
    <div class="eyebrow">Changelog</div>
    <h1 class="page-title">An honest maintenance record.</h1>
    <p class="lede">RDS builds trust through transparency rather than polish or social proof. Each entry records what changed and the impact it has on people using the system.</p>

    <section class="section" style="margin-top:var(--rds-space-6)">
      <div class="cl-filters">
        ${filters.map(([t,l],i) => `<button class="cl-filter ${i===0?'active':''}" data-type="${t}">${l}</button>`).join('')}
      </div>
      <div class="card" style="padding:0 var(--rds-space-6)">
        ${entries.map(([date,ver,changes]) => `
          <div class="cl-entry">
            <div class="cl-meta"><span class="cl-date">${date}</span><span class="cl-ver">${ver}</span></div>
            <div class="cl-changes">
              ${changes.map(([type,desc,impact]) => `
                <div class="cl-change" data-type="${type}">
                  <div style="display:flex;gap:12px;align-items:flex-start">
                    <span class="cl-type ${type}">${type[0].toUpperCase()+type.slice(1)}</span>
                    <p>${desc}</p>
                  </div>
                  <div class="cl-impact"><b>Impact.</b> ${impact}</div>
                </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>
      <div class="future-note">${I.tick} The changelog exists to make RDS transparent as it grows.</div>
    </section>
  </div>`;
}

function pageUseWithAI() {
  const prompts = [
    ['Build a page using RDS','Use RDS as the source of truth. Follow the RDS colour tokens, spacing rules, typography hierarchy, component guidance, and accessibility principles. Do not create random styles outside the system. Build the page from reusable structure before adding visual polish.'],
    ['Review this interface against RDS','Review this interface against RDS principles. Check spacing, typography hierarchy, colour usage, button hierarchy, accessibility, focus states, token consistency, and whether any UI decisions feel disconnected from the system.'],
    ['Convert this screen into reusable structure','Analyse this screen and identify which decisions should become reusable tokens, components, patterns, or documentation rules in RDS.'],
    ['Apply RDS button rules','Review the buttons in this interface. Check action hierarchy, pairing, loading states, destructive usage, focus states, labels, and whether there are too many competing primary actions.'],
    ['Check accessibility using RDS','Review this interface using the RDS accessibility checklist. Flag poor contrast, missing labels, unclear errors, invisible focus states, weak keyboard support, poor touch targets, unclear loading states, and motion issues.'],
    ['Generate a system aligned component','Create a component that follows RDS documentation standards. Include anatomy, variants, states, token usage, accessibility guidance, usage rules, and real product examples. Do not create purely decorative variants.'],
  ];
  return `
  <div class="page" id="page-use-with-ai">
    <div class="eyebrow">${I.spark} Guides · Use RDS with AI</div>
    <h1 class="page-title">Give AI builders a source of truth.</h1>
    <p class="lede">AI and no-code builders are fast, but they often generate disconnected UI decisions. RDS gives them a clear reference for spacing, typography, colour, component behaviour, accessibility, and structure, so the output stays part of one system.</p>

    <section class="section" style="margin-top:var(--rds-space-6)">
      <div class="grid grid-3">
        ${[
          ['The problem','Builders invent new spacing, colours, and components per screen. Output looks fine alone but breaks consistency across a product.'],
          ['The RDS role','RDS becomes the shared rulebook you point the builder at, before and after generation.'],
          ['The result','Generated UI you can actually keep, because it follows decisions you already documented.'],
        ].map(([t,d]) => `<div class="card"><h3 class="sub-title">${t}</h3><p style="font-size:14px">${d}</p></div>`).join('')}
      </div>
    </section>

    <section class="section">
      <div class="eyebrow">Ready to copy</div>
      <h2 class="section-title">Six prompts that keep AI on-system.</h2>
      <p class="section-intro">Copy any prompt, paste it into your builder of choice, and attach or link your RDS reference. These are tools, not theory.</p>
      <div class="prompt-grid">
        ${prompts.map(([title,body]) => `
          <div class="prompt-card">
            <div class="prompt-head">
              <h4>${title}</h4>
              <button class="copy-btn" data-copy="${body.replace(/"/g,'&quot;')}" data-toast="Prompt copied" aria-label="Copy prompt: ${title}">${I.copy}<span>Copy</span></button>
            </div>
            <div class="prompt-body"><p>${body}</p></div>
          </div>`).join('')}
      </div>
    </section>

    <section class="section">
      <div class="eyebrow">Workflow</div>
      <h2 class="section-title">Before, during, after.</h2>
      <div class="card" style="padding:var(--rds-space-3) var(--rds-space-5)">
        <div class="steps">
          ${[
            ['Before prompting','Point the builder at RDS tokens, spacing, typography, and component rules as the source of truth.'],
            ['During generation','Ask for reusable structure first, visual polish second. Reject output that invents styles outside the system.'],
            ['After generation','Run the RDS accessibility checklist and button rules over the result, then document anything reusable back into RDS.'],
          ].map(([t,d],i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-body"><h4>${t}</h4><p>${d}</p></div></div>`).join('')}
        </div>
      </div>
    </section>

    <div class="cta-band">
      <div class="grid-deco"></div>
      <h2>Documentation is part of the product.</h2>
      <p>The clearer your RDS reference, the more useful it is to every builder you point at it.</p>
      <div class="btn-row"><a class="rds-btn rds-btn--secondary" data-nav="design-tokens">Browse tokens ${I.arrow}</a><a class="rds-btn rds-btn--ghost" data-nav="accessibility" style="color:var(--rds-color-background-default)">Open the checklist</a></div>
    </div>
  </div>`;
}

function pageContributing() {
  return `
  <div class="page" id="page-contributing">
    <div class="eyebrow">Guides · Contribution</div>
    <h1 class="page-title">Contributing to RDS.</h1>
    <p class="lede">RDS may eventually open to other designers. Governance comes early, on purpose, so the system stays intentional instead of becoming a dumping ground for trendy patterns.</p>

    <section class="section" style="margin-top:var(--rds-space-6)">
      <div class="statement-block">
        <div class="eyebrow">Positioning</div>
        <p class="statement" style="max-width:34ch">RDS accepts documented decisions, not random components.</p>
      </div>
    </section>

    <section class="section">
      <div class="eyebrow">Principles</div>
      <h2 class="section-title">What a contribution must respect.</h2>
      <div class="grid grid-2" style="gap:10px 16px;margin-top:var(--rds-space-5)">
        ${[
          'Every component must include anatomy, states, tokens, accessibility, and usage rules.',
          'Every new token must solve a reusable system problem.',
          'Every contribution must improve clarity, consistency, accessibility, or maintainability.',
          'RDS should not become a dumping ground for trendy UI patterns.',
          'Components should not be added just to make the library look bigger.',
          'Documentation quality matters as much as visual quality.',
        ].map(p => `<div class="card" style="display:flex;gap:11px;align-items:flex-start;padding:14px 16px"><span class="cc-dot" style="margin-top:6px"></span><span style="font-size:14px;color:var(--rds-color-text-primary)">${p}</span></div>`).join('')}
      </div>
    </section>

    <section class="section">
      <div class="eyebrow">Ways to contribute</div>
      <h2 class="section-title">Seven useful contributions.</h2>
      <div class="contrib-grid">
        ${[
          'Suggest a component','Improve documentation','Add accessibility guidance','Propose a token','Share a product example','Report inconsistency','Improve AI builder prompts',
        ].map(c => `<div class="contrib-chip"><span class="cc-dot"></span>${c}</div>`).join('')}
      </div>
    </section>

    <section class="section">
      <div class="eyebrow">Quality checklist</div>
      <h2 class="section-title">Before you propose anything.</h2>
      <p class="section-intro">Tap to check each one. If a contribution cannot answer these, it is not ready for RDS yet.</p>
      <ul class="checklist">
        ${[
          'Does this improve the system?',
          'Is it reusable across product types?',
          'Is it accessible?',
          'Does it follow RDS naming and token logic?',
          'Is the documentation clear?',
          'Does it avoid trend chasing?',
          'Does it reduce repeated decisions?',
          'Would another designer understand when and why to use it?',
        ].map(x => `<li><span class="box">${I.checkW}</span><span>${x}</span></li>`).join('')}
      </ul>
    </section>

    <div class="cta-band">
      <div class="grid-deco"></div>
      <h2>Good systems explain the decision, not just the component.</h2>
      <p>That standard is what keeps RDS protected, intentional, and serious as it grows.</p>
      <div class="btn-row"><a class="rds-btn rds-btn--secondary" data-nav="components">See the component standard ${I.arrow}</a></div>
    </div>
  </div>`;
}

/* ============================================================
   BOOT
   ============================================================ */
function render() {
  buildShell();
  document.getElementById('content').innerHTML =
    pageOverview() + pageGettingStarted() + pageFoundations() +
    pageDesignTokens() + pageComponents() + pageButton() +
    pageAccessibility() + pageUseWithAI() + pageContributing() +
    pageRoadmap() + pageChangelog();
  initTheme();
  wireEvents();
  const hash = (location.hash || '#overview').slice(1);
  go(LABELS[hash] ? hash : 'overview');
}
render();

</script>
</body>
</html>
