<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDS — Riye Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RDS — Riye Design System
   Visual signature: the "system grid" — a precise dotted/lined
   structural grid motif + a distinct token-card treatment.
   Palette: warm paper + deep ink, single confident accent (clay/rust).
   ============================================================ */

:root {
  /* --- Accent + brand (theme-invariant) --- */
  --rds-accent:        #b5462b;   /* oxblood / clay — confident, warm, not purple */
  --rds-accent-soft:   #c9694f;
  --rds-accent-deep:   #8f3420;
  --rds-olive:         #6b6f3f;   /* olive supporting accent */
  --rds-olive-soft:    #8a8f57;
  --rds-focus-ring:    #c8841f;   /* amber focus ring */
  --rds-grid-line:     rgba(20, 16, 12, 0.055);

  /* --- Light theme (paper) --- */
  --rds-color-background-default: #f4f0e8;
  --rds-color-background-alt:     #ece6da;
  --rds-color-surface-card:       #fbf9f4;
  --rds-color-surface-raised:     #ffffff;
  --rds-color-surface-sunken:     #ebe5d8;
  --rds-color-text-primary:       #1c1814;
  --rds-color-text-secondary:     #524b40;
  --rds-color-text-muted:         #8a8175;
  --rds-color-border-default:     #d9d1c1;
  --rds-color-border-strong:      #c2b8a4;
  --rds-color-success:            #3f6f4a;
  --rds-color-danger:             #a23a2a;
  --rds-code-bg:                  #2a2520;
  --rds-code-text:                #ece6da;

  /* --- Semantic action tokens (power the Button) --- */
  --rds-color-action-primary:     var(--rds-accent);
  --rds-color-action-on-primary:  #ffffff;
  --rds-focus-ring-default:       var(--rds-focus-ring);

  /* --- Spacing scale --- */
  --rds-space-1: 4px;
  --rds-space-2: 8px;
  --rds-space-3: 12px;
  --rds-space-4: 16px;
  --rds-space-5: 24px;
  --rds-space-6: 32px;
  --rds-space-7: 48px;
  --rds-space-8: 64px;
  --rds-space-9: 96px;

  /* --- Radius --- */
  --rds-radius-sm: 4px;
  --rds-radius-md: 8px;
  --rds-radius-lg: 14px;
  --rds-radius-xl: 22px;

  /* --- Motion --- */
  --rds-motion-fast: 140ms cubic-bezier(0.4, 0, 0.2, 1);
  --rds-motion-base: 240ms cubic-bezier(0.32, 0.72, 0, 1);

  /* --- Type --- */
  --rds-font-display: "Fraunces", Georgia, serif;
  --rds-font-body:    "Spline Sans", system-ui, sans-serif;
  --rds-font-serif:   "Newsreader", Georgia, serif;
  --rds-font-mono:    "IBM Plex Mono", ui-monospace, monospace;

  --rds-shadow-sm: 0 1px 2px rgba(28,24,20,0.06), 0 1px 1px rgba(28,24,20,0.04);
  --rds-shadow-md: 0 4px 14px rgba(28,24,20,0.07), 0 2px 4px rgba(28,24,20,0.05);
  --rds-shadow-lg: 0 18px 48px rgba(28,24,20,0.12), 0 4px 12px rgba(28,24,20,0.06);
}

html[data-theme="dark"] {
  --rds-accent:        #e07a5f;
  --rds-accent-soft:   #ec9b85;
  --rds-accent-deep:   #c45f44;
  --rds-olive:         #a4a86a;
  --rds-olive-soft:    #b8bc82;
  --rds-focus-ring:    #e0a64a;
  --rds-grid-line:     rgba(255, 248, 240, 0.05);

  --rds-color-background-default: #16130f;
  --rds-color-background-alt:     #1d1915;
  --rds-color-surface-card:       #211d18;
  --rds-color-surface-raised:     #292420;
  --rds-color-surface-sunken:     #100d0a;
  --rds-color-text-primary:       #f2ece2;
  --rds-color-text-secondary:     #c3b9aa;
  --rds-color-text-muted:         #8a8073;
  --rds-color-border-default:     #342e27;
  --rds-color-border-strong:      #443d34;
  --rds-color-success:            #6fae7e;
  --rds-color-danger:             #e08070;
  --rds-code-bg:                  #0c0a08;
  --rds-code-text:                #e8e0d2;

  --rds-shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --rds-shadow-md: 0 4px 14px rgba(0,0,0,0.45);
  --rds-shadow-lg: 0 18px 48px rgba(0,0,0,0.6);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--rds-font-body);
  background: var(--rds-color-background-default);
  color: var(--rds-color-text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background var(--rds-motion-base), color var(--rds-motion-base);
  /* SYSTEM GRID MOTIF — the recognizable RDS signature */
  background-image:
    linear-gradient(var(--rds-grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--rds-grid-line) 1px, transparent 1px);
  background-size: 32px 32px;
  background-position: -1px -1px;
}

::selection { background: var(--rds-accent); color: #fff; }

/* ---------- Layout shell ---------- */
.app { display: flex; min-height: 100vh; }

/* ---------- Sidebar ---------- */
.sidebar {
  width: 272px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid var(--rds-color-border-default);
  background: var(--rds-color-background-alt);
  padding: var(--rds-space-5) 0 var(--rds-space-7);
  transition: transform var(--rds-motion-base), background var(--rds-motion-base);
  z-index: 40;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  padding: 0 var(--rds-space-5) var(--rds-space-5);
  text-decoration: none; color: inherit;
}
/* RDS logo lockup — grid-cell glyph */
.brand-mark {
  width: 38px; height: 38px; flex-shrink: 0;
  border: 1.5px solid var(--rds-color-text-primary);
  border-radius: 9px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  overflow: hidden;
  position: relative;
}
.brand-mark span { border: 0.75px solid var(--rds-color-border-strong); }
.brand-mark span:nth-child(1) { background: var(--rds-accent); }
.brand-mark span:nth-child(4) { background: var(--rds-color-text-primary); }
.brand-name { font-family: var(--rds-font-display); font-weight: 600; font-size: 20px; letter-spacing: -0.02em; line-height: 1; }
.brand-sub { font-size: 11px; color: var(--rds-color-text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; }

.nav-group { padding: var(--rds-space-4) var(--rds-space-5) 0; }
.nav-group-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--rds-color-text-muted);
  padding: 0 var(--rds-space-3) var(--rds-space-2);
}
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 8px var(--rds-space-3);
  border-radius: var(--rds-radius-md);
  color: var(--rds-color-text-secondary);
  text-decoration: none; font-size: 14.5px; font-weight: 500;
  cursor: pointer;
  transition: background var(--rds-motion-fast), color var(--rds-motion-fast);
  border: 1px solid transparent;
}
.nav-link:hover { background: var(--rds-color-surface-card); color: var(--rds-color-text-primary); }
.nav-link.sub { font-size: 13.5px; padding-left: var(--rds-space-6); color: var(--rds-color-text-muted); }
.nav-link.active {
  background: var(--rds-color-surface-raised);
  color: var(--rds-color-text-primary);
  border-color: var(--rds-color-border-default);
  box-shadow: var(--rds-shadow-sm);
}
.nav-link.active .nav-dot { background: var(--rds-accent); }
.nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--rds-color-border-strong); flex-shrink: 0; transition: background var(--rds-motion-fast); }

/* ---------- Main ---------- */
.main { flex: 1; min-width: 0; }
.topbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--rds-space-3) var(--rds-space-6);
  border-bottom: 1px solid var(--rds-color-border-default);
  background: color-mix(in srgb, var(--rds-color-background-default) 82%, transparent);
  backdrop-filter: blur(12px);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.menu-btn { display: none; background: none; border: 1px solid var(--rds-color-border-default); border-radius: 8px; padding: 7px 9px; cursor: pointer; color: inherit; }
.crumb { font-size: 13px; color: var(--rds-color-text-muted); font-family: var(--rds-font-mono); }
.crumb b { color: var(--rds-color-text-secondary); font-weight: 500; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.theme-toggle {
  display: flex; align-items: center; gap: 7px;
  background: var(--rds-color-surface-card);
  border: 1px solid var(--rds-color-border-default);
  border-radius: 999px; padding: 6px 13px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--rds-color-text-secondary);
  font-family: var(--rds-font-body);
  transition: all var(--rds-motion-fast);
}
.theme-toggle:hover { border-color: var(--rds-color-border-strong); color: var(--rds-color-text-primary); }

.content { max-width: 1080px; margin: 0 auto; padding: var(--rds-space-8) var(--rds-space-6) var(--rds-space-9); }
.page { display: none; animation: fadeUp 0.5s cubic-bezier(0.32,0.72,0,1); }
.page.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

/* ---------- Reusable type ---------- */
.eyebrow {
  font-family: var(--rds-font-mono); font-size: 12px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--rds-accent);
  display: inline-flex; align-items: center; gap: 8px; margin-bottom: var(--rds-space-4);
}
.eyebrow::before { content: ""; width: 22px; height: 1.5px; background: var(--rds-accent); }
h1.page-title { font-family: var(--rds-font-display); font-weight: 600; font-size: clamp(34px, 5vw, 52px); line-height: 1.02; letter-spacing: -0.025em; margin-bottom: var(--rds-space-4); }
.lede { font-family: var(--rds-font-serif); font-size: clamp(18px, 2.2vw, 22px); line-height: 1.5; color: var(--rds-color-text-secondary); max-width: 68ch; }
h2.section-title { font-family: var(--rds-font-display); font-weight: 600; font-size: clamp(24px, 3vw, 32px); letter-spacing: -0.02em; margin-bottom: var(--rds-space-3); }
h3.sub-title { font-family: var(--rds-font-display); font-weight: 600; font-size: 20px; letter-spacing: -0.01em; margin-bottom: var(--rds-space-2); }
.section { margin-top: var(--rds-space-9); }
.section-intro { font-size: 16.5px; color: var(--rds-color-text-secondary); max-width: 70ch; margin-bottom: var(--rds-space-6); }
p { color: var(--rds-color-text-secondary); }

/* ---------- Status badge ---------- */
.status-badge {
  display: inline-flex; align-items: center; gap: 9px;
  background: var(--rds-color-surface-card);
  border: 1px solid var(--rds-color-border-strong);
  border-radius: 999px; padding: 7px 15px 7px 12px;
  font-size: 13px; font-weight: 500; color: var(--rds-color-text-secondary);
}
.status-badge .pulse { position: relative; width: 8px; height: 8px; }
.status-badge .pulse::before { content:""; position:absolute; inset:0; border-radius:50%; background: var(--rds-accent); }
.status-badge .pulse::after { content:""; position:absolute; inset:0; border-radius:50%; background: var(--rds-accent); animation: pulse 2s ease-out infinite; }
@keyframes pulse { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(3);opacity:0} }
.status-badge code { font-family: var(--rds-font-mono); color: var(--rds-accent); font-weight:600; }

/* ---------- Buttons (the real RDS button component) ---------- */
.rds-btn {
  font-family: var(--rds-font-body); font-weight: 600; font-size: 14.5px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px 20px; border-radius: var(--rds-radius-md);
  border: 1px solid transparent; cursor: pointer; text-decoration: none;
  min-height: 44px; line-height: 1; position: relative;
  transition: background var(--rds-motion-fast), border-color var(--rds-motion-fast), transform var(--rds-motion-fast), box-shadow var(--rds-motion-fast), color var(--rds-motion-fast);
}
.rds-btn:active { transform: translateY(1px); }
.rds-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--rds-color-background-default), 0 0 0 3px var(--rds-focus-ring); }
.rds-btn--primary { background: var(--rds-accent); color: #fff; }
.rds-btn--primary:hover { background: var(--rds-accent-deep); }
.rds-btn--secondary { background: var(--rds-color-surface-card); color: var(--rds-color-text-primary); border-color: var(--rds-color-border-strong); }
.rds-btn--secondary:hover { background: var(--rds-color-surface-raised); border-color: var(--rds-color-text-muted); }
.rds-btn--tertiary { background: transparent; color: var(--rds-color-text-primary); border-color: var(--rds-color-border-default); }
.rds-btn--tertiary:hover { background: var(--rds-color-surface-card); }
.rds-btn--ghost { background: transparent; color: var(--rds-color-text-secondary); }
.rds-btn--ghost:hover { background: var(--rds-color-surface-sunken); color: var(--rds-color-text-primary); }
.rds-btn--destructive { background: var(--rds-color-danger); color: #fff; }
.rds-btn--destructive:hover { filter: brightness(0.9); }
.rds-btn--link { background: transparent; color: var(--rds-accent); padding: 6px 4px; min-height: auto; text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1.5px; }
.rds-btn--link:hover { color: var(--rds-accent-deep); }
.rds-btn:disabled, .rds-btn[aria-disabled="true"] { opacity: 0.45; cursor: not-allowed; transform: none; }
.rds-btn.sm { padding: 7px 13px; min-height: 34px; font-size: 13px; }
.rds-btn .spinner { width: 15px; height: 15px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.btn-row { display: flex; flex-wrap: wrap; gap: var(--rds-space-3); margin-top: var(--rds-space-5); }

/* ---------- Cards & grids ---------- */
.card {
  background: var(--rds-color-surface-card);
  border: 1px solid var(--rds-color-border-default);
  border-radius: var(--rds-radius-lg);
  padding: var(--rds-space-5);
  transition: border-color var(--rds-motion-fast), transform var(--rds-motion-fast), box-shadow var(--rds-motion-fast);
}
.card.hover:hover { border-color: var(--rds-color-border-strong); transform: translateY(-2px); box-shadow: var(--rds-shadow-md); }
.grid { display: grid; gap: var(--rds-space-4); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }

/* ---------- Hero ---------- */
.hero { position: relative; padding: var(--rds-space-7) 0 var(--rds-space-8); }
.hero-grid-accent {
  position: absolute; top: -20px; right: -40px; width: 320px; height: 320px;
  pointer-events: none; opacity: 0.5;
  background-image:
    linear-gradient(var(--rds-accent) 1px, transparent 1px),
    linear-gradient(90deg, var(--rds-accent) 1px, transparent 1px);
  background-size: 40px 40px;
  -webkit-mask-image: radial-gradient(circle at 70% 30%, #000, transparent 65%);
  mask-image: radial-gradient(circle at 70% 30%, #000, transparent 65%);
  opacity: 0.14;
}
.hero h1 { font-family: var(--rds-font-display); font-weight: 600; font-size: clamp(40px, 6.5vw, 76px); line-height: 0.98; letter-spacing: -0.035em; margin: var(--rds-space-4) 0 var(--rds-space-5); max-width: 16ch; }
.hero h1 em { font-style: italic; color: var(--rds-accent); }
.hero .lede { max-width: 56ch; margin-bottom: var(--rds-space-6); }

/* ---------- Audience / value cards ---------- */
.audience-card { display: flex; flex-direction: column; gap: 10px; }
.audience-card .ac-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--rds-color-surface-sunken); display: flex; align-items: center; justify-content: center; border: 1px solid var(--rds-color-border-default); }
.audience-card h3 { font-family: var(--rds-font-display); font-size: 17px; font-weight: 600; }
.audience-card p { font-size: 14px; line-height: 1.55; }

.pillar { position: relative; padding-left: var(--rds-space-6); }
.pillar .num { position: absolute; left: 0; top: 0; font-family: var(--rds-font-mono); font-size: 13px; color: var(--rds-accent); font-weight: 600; }
.pillar h3 { font-family: var(--rds-font-display); font-size: 19px; font-weight: 600; margin-bottom: 6px; }
.pillar p { font-size: 14.5px; }

/* ---------- Comparison ---------- */
.compare { display: grid; grid-template-columns: 1fr 1fr; gap: var(--rds-space-4); }
.compare-col { padding: var(--rds-space-5); border-radius: var(--rds-radius-lg); border: 1px solid var(--rds-color-border-default); }
.compare-col.them { background: var(--rds-color-surface-sunken); }
.compare-col.us { background: var(--rds-color-surface-card); border-color: var(--rds-accent); position: relative; }
.compare-col.us::before { content: "RDS"; position: absolute; top: -10px; left: 20px; background: var(--rds-accent); color: #fff; font-family: var(--rds-font-mono); font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 5px; letter-spacing: 0.05em; }
.compare-col h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--rds-color-text-muted); margin-bottom: var(--rds-space-4); font-weight: 600; }
.compare-col ul { list-style: none; display: flex; flex-direction: column; gap: 11px; }
.compare-col li { display: flex; gap: 10px; align-items: flex-start; font-size: 14.5px; color: var(--rds-color-text-secondary); }
.compare-col li svg { flex-shrink: 0; margin-top: 3px; }

/* ---------- Pull-quote lines ---------- */
.statement { font-family: var(--rds-font-display); font-weight: 500; font-size: clamp(20px, 2.6vw, 27px); line-height: 1.3; letter-spacing: -0.01em; color: var(--rds-color-text-primary); max-width: 24ch; }
.statement-block { border-left: 2px solid var(--rds-accent); padding-left: var(--rds-space-5); }

/* ---------- Token cards (RDS SIGNATURE TREATMENT) ---------- */
.token-card {
  background: var(--rds-color-surface-card);
  border: 1px solid var(--rds-color-border-default);
  border-radius: var(--rds-radius-lg);
  overflow: hidden;
  transition: border-color var(--rds-motion-fast), box-shadow var(--rds-motion-fast);
  display: flex; flex-direction: column;
}
.token-card:hover { border-color: var(--rds-color-border-strong); box-shadow: var(--rds-shadow-sm); }
.token-swatch { height: 76px; border-bottom: 1px solid var(--rds-color-border-default); position: relative; display: flex; align-items: center; justify-content: center; }
.token-swatch.grid-bg { background-image: linear-gradient(45deg, var(--rds-color-border-default) 25%, transparent 25%, transparent 75%, var(--rds-color-border-default) 75%), linear-gradient(45deg, var(--rds-color-border-default) 25%, transparent 25%, transparent 75%, var(--rds-color-border-default) 75%); background-size: 14px 14px; background-position: 0 0, 7px 7px; }
.token-spacedemo { background: var(--rds-accent); border-radius: 3px; }
.token-radiusdemo { width: 50px; height: 50px; background: var(--rds-color-surface-sunken); border: 1.5px solid var(--rds-accent); }
.token-motiondemo { width: 40px; height: 14px; border-radius: 999px; background: var(--rds-accent); animation: slide 1.6s var(--rds-motion-base) infinite alternate; }
@keyframes slide { from { transform: translateX(-16px); } to { transform: translateX(16px); } }
.token-body { padding: var(--rds-space-4); display: flex; flex-direction: column; gap: 10px; flex: 1; }
.token-name { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.token-name code { font-family: var(--rds-font-mono); font-size: 12.5px; font-weight: 600; color: var(--rds-color-text-primary); word-break: break-all; }
.token-meta { font-size: 13px; color: var(--rds-color-text-secondary); line-height: 1.5; }
.token-meta b { color: var(--rds-color-text-primary); font-weight: 600; }
.token-value-pill { font-family: var(--rds-font-mono); font-size: 11.5px; background: var(--rds-color-surface-sunken); padding: 2px 7px; border-radius: 4px; color: var(--rds-color-text-secondary); border: 1px solid var(--rds-color-border-default); }
.copy-btn {
  background: var(--rds-color-surface-sunken); border: 1px solid var(--rds-color-border-default);
  border-radius: 6px; padding: 5px 7px; cursor: pointer; color: var(--rds-color-text-muted);
  display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-family: var(--rds-font-mono);
  transition: all var(--rds-motion-fast); flex-shrink: 0;
}
.copy-btn:hover { color: var(--rds-color-text-primary); border-color: var(--rds-color-border-strong); }
.copy-btn.copied { color: var(--rds-color-success); border-color: var(--rds-color-success); }
.theme-tag { font-size: 11px; font-family: var(--rds-font-mono); color: var(--rds-color-text-muted); display: inline-flex; align-items: center; gap: 5px; margin-top: 2px; }
.theme-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rds-accent); }

/* ---------- Code block ---------- */
.code {
  background: var(--rds-code-bg); color: var(--rds-code-text);
  font-family: var(--rds-font-mono); font-size: 13px; line-height: 1.7;
  border-radius: var(--rds-radius-md); padding: var(--rds-space-4) var(--rds-space-5);
  overflow-x: auto; border: 1px solid var(--rds-color-border-strong);
}
.code .c { color: #8a8073; }
.code .k { color: var(--rds-accent-soft); }

/* ---------- Steps / workflow ---------- */
.steps { display: flex; flex-direction: column; }
.step { display: flex; gap: var(--rds-space-4); padding: var(--rds-space-4) 0; border-bottom: 1px dashed var(--rds-color-border-default); }
.step:last-child { border-bottom: none; }
.step-num { width: 30px; height: 30px; flex-shrink: 0; border-radius: 8px; background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-strong); display: flex; align-items: center; justify-content: center; font-family: var(--rds-font-mono); font-size: 13px; font-weight: 600; color: var(--rds-accent); }
.step-body h4 { font-size: 15.5px; font-weight: 600; margin-bottom: 2px; color: var(--rds-color-text-primary); }
.step-body p { font-size: 14px; }

/* ---------- Anatomy diagram ---------- */
.anatomy { display: grid; grid-template-columns: 1fr 1fr; gap: var(--rds-space-6); align-items: center; }
.anatomy-stage { background: var(--rds-color-surface-sunken); border-radius: var(--rds-radius-lg); border: 1px solid var(--rds-color-border-default); padding: var(--rds-space-8) var(--rds-space-5); display: flex; align-items: center; justify-content: center; position: relative; min-height: 220px; background-image: radial-gradient(var(--rds-grid-line) 1.5px, transparent 1.5px); background-size: 18px 18px; }
.anatomy-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
.anatomy-list li { display: flex; gap: 12px; align-items: flex-start; font-size: 14.5px; }
.anatomy-list .a-num { font-family: var(--rds-font-mono); font-size: 12px; font-weight: 600; color: #fff; background: var(--rds-accent); width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.anatomy-list b { color: var(--rds-color-text-primary); font-weight: 600; }
.anatomy-list span.d { color: var(--rds-color-text-muted); }

/* ---------- State grid ---------- */
.state-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--rds-space-4); }
.state-cell { background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-md); padding: var(--rds-space-5); display: flex; flex-direction: column; align-items: center; gap: var(--rds-space-4); }
.state-cell .label { font-family: var(--rds-font-mono); font-size: 12px; color: var(--rds-color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.state-cell .desc { font-size: 13px; text-align: center; color: var(--rds-color-text-secondary); }
.demo-btn-default { background: var(--rds-accent); color: #fff; }
.demo-btn-hover { background: var(--rds-accent-deep); color: #fff; }
.demo-btn-active { background: var(--rds-accent-deep); color: #fff; transform: translateY(1px); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
.demo-btn-focus { background: var(--rds-accent); color: #fff; box-shadow: 0 0 0 2px var(--rds-color-surface-card), 0 0 0 3px var(--rds-focus-ring); }

/* ---------- Checklist ---------- */
.checklist { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.checklist li { display: flex; gap: 12px; align-items: center; padding: 13px var(--rds-space-4); border-radius: var(--rds-radius-md); background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default); font-size: 14.5px; color: var(--rds-color-text-secondary); cursor: pointer; transition: all var(--rds-motion-fast); }
.checklist li:hover { border-color: var(--rds-color-border-strong); }
.checklist .box { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--rds-color-border-strong); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all var(--rds-motion-fast); }
.checklist li.checked .box { background: var(--rds-accent); border-color: var(--rds-accent); }
.checklist li.checked .box svg { opacity: 1; }
.checklist .box svg { opacity: 0; }
.checklist li.checked span { color: var(--rds-color-text-primary); }

/* ---------- A11y examples ---------- */
.a11y-demo { display: flex; flex-direction: column; gap: 8px; padding: var(--rds-space-4); border-radius: var(--rds-radius-md); border: 1px solid var(--rds-color-border-default); }
.a11y-good { border-left: 3px solid var(--rds-color-success); }
.a11y-bad { border-left: 3px solid var(--rds-color-danger); }
.a11y-tag { font-size: 11px; font-family: var(--rds-font-mono); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.a11y-good .a11y-tag { color: var(--rds-color-success); }
.a11y-bad .a11y-tag { color: var(--rds-color-danger); }
.contrast-good { background: #1c1814; color: #f4f0e8; padding: 10px 14px; border-radius: 6px; font-size: 14px; }
.contrast-bad { background: #cabfa8; color: #d6cbb5; padding: 10px 14px; border-radius: 6px; font-size: 14px; }

/* ---------- Roadmap ---------- */
.roadmap { position: relative; padding-left: var(--rds-space-6); }
.roadmap::before { content:""; position: absolute; left: 9px; top: 8px; bottom: 8px; width: 1.5px; background: var(--rds-color-border-strong); }
.rm-item { position: relative; padding-bottom: var(--rds-space-6); }
.rm-item:last-child { padding-bottom: 0; }
.rm-dot { position: absolute; left: -27px; top: 4px; width: 20px; height: 20px; border-radius: 6px; background: var(--rds-color-surface-card); border: 1.5px solid var(--rds-color-border-strong); display:flex; align-items:center; justify-content:center; }
.rm-item.current .rm-dot { background: var(--rds-accent); border-color: var(--rds-accent); }
.rm-item.current .rm-dot::after { content:""; width:7px; height:7px; border-radius:2px; background:#fff; }
.rm-ver { display: flex; align-items: center; gap: 12px; margin-bottom: var(--rds-space-3); }
.rm-ver h3 { font-family: var(--rds-font-display); font-size: 22px; font-weight: 600; }
.rm-pill { font-family: var(--rds-font-mono); font-size: 11px; padding: 3px 9px; border-radius: 5px; font-weight: 600; letter-spacing: 0.04em; }
.rm-pill.now { background: var(--rds-accent); color: #fff; }
.rm-pill.next { background: var(--rds-color-surface-sunken); color: var(--rds-color-text-secondary); border: 1px solid var(--rds-color-border-default); }
.rm-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; margin-top: var(--rds-space-2); }
.rm-list li { font-size: 14px; color: var(--rds-color-text-secondary); display: flex; gap: 8px; align-items: center; }
.rm-list li::before { content:""; width: 4px; height: 4px; border-radius: 50%; background: var(--rds-color-border-strong); flex-shrink:0; }

/* ---------- Changelog ---------- */
.cl-entry { display: grid; grid-template-columns: 150px 1fr; gap: var(--rds-space-5); padding: var(--rds-space-5) 0; border-bottom: 1px dashed var(--rds-color-border-default); }
.cl-entry:last-child { border-bottom: none; }
.cl-meta { display: flex; flex-direction: column; gap: 6px; }
.cl-date { font-family: var(--rds-font-mono); font-size: 13px; color: var(--rds-color-text-primary); font-weight: 500; }
.cl-ver { font-family: var(--rds-font-mono); font-size: 12px; color: var(--rds-color-text-muted); }
.cl-changes { display: flex; flex-direction: column; gap: var(--rds-space-3); }
.cl-change { display: flex; gap: 12px; align-items: flex-start; }
.cl-type { font-family: var(--rds-font-mono); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; min-width: 78px; text-align: center; letter-spacing: 0.03em; }
.cl-type.added { background: color-mix(in srgb, var(--rds-color-success) 16%, transparent); color: var(--rds-color-success); }
.cl-type.improved { background: color-mix(in srgb, var(--rds-accent) 16%, transparent); color: var(--rds-accent); }
.cl-type.fixed { background: var(--rds-color-surface-sunken); color: var(--rds-color-text-secondary); }
.cl-type.deprecated { background: color-mix(in srgb, var(--rds-color-danger) 14%, transparent); color: var(--rds-color-danger); }
.cl-change p { font-size: 14.5px; color: var(--rds-color-text-secondary); }

/* ---------- Component library ---------- */
.lib-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--rds-space-4); }
.comp-card {
  position: relative; display: flex; flex-direction: column; gap: var(--rds-space-3);
  background: var(--rds-color-surface-card);
  border: 1px solid var(--rds-color-border-default);
  border-radius: var(--rds-radius-lg);
  padding: var(--rds-space-5);
  transition: border-color var(--rds-motion-fast), transform var(--rds-motion-fast), box-shadow var(--rds-motion-fast);
}
.comp-card.available { border-color: var(--rds-accent); cursor: pointer; }
.comp-card.available:hover { transform: translateY(-2px); box-shadow: var(--rds-shadow-md); }
.comp-card.soon { background: var(--rds-color-background-alt); }
.comp-card.soon:hover { border-color: var(--rds-color-border-strong); }
.comp-card.soon .comp-preview { opacity: 0.72; }
.comp-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.comp-head h3 { font-family: var(--rds-font-display); font-size: 18px; font-weight: 600; color: var(--rds-color-text-primary); letter-spacing: -0.01em; }
.comp-status {
  font-family: var(--rds-font-mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px;
  flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
}
.comp-status.available { background: var(--rds-accent); color: #fff; }
.comp-status.available .pdot { width: 5px; height: 5px; border-radius: 50%; background: #fff; }
.comp-status.soon { background: var(--rds-color-surface-sunken); color: var(--rds-color-text-muted); border: 1px solid var(--rds-color-border-default); }
.comp-desc { font-size: 13.5px; line-height: 1.55; color: var(--rds-color-text-secondary); }
.comp-preview {
  margin-top: 2px; background: var(--rds-color-surface-sunken);
  border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-md);
  padding: 13px var(--rds-space-4); min-height: 58px;
  display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap;
  background-image: radial-gradient(var(--rds-grid-line) 1.2px, transparent 1.2px); background-size: 14px 14px;
}
.comp-std { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; padding-top: 4px; }
.comp-std .std-chip { font-family: var(--rds-font-mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; background: transparent; border: 1px solid var(--rds-color-border-default); color: var(--rds-color-text-muted); }
.comp-card.available .comp-std .std-chip { border-color: color-mix(in srgb, var(--rds-accent) 40%, var(--rds-color-border-default)); color: var(--rds-accent); }
.comp-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--rds-accent); margin-top: 2px; }
/* tiny preview primitives for coming-soon cards */
.pv-line { height: 8px; border-radius: 3px; background: var(--rds-color-border-strong); }
.pv-box { border: 1px solid var(--rds-color-border-strong); border-radius: 5px; background: var(--rds-color-surface-card); }
.pv-pill { padding: 2px 9px; border-radius: 999px; font-size: 10px; font-family: var(--rds-font-mono); border: 1px solid var(--rds-color-border-strong); color: var(--rds-color-text-muted); background: var(--rds-color-surface-card); }
.pv-dot { width: 8px; height: 8px; border-radius: 50%; }
@media (max-width: 900px) { .lib-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .lib-grid { grid-template-columns: 1fr; } }

/* ---------- Quick links ---------- */
.quicklinks { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--rds-space-3); }
.ql {
  display: flex; flex-direction: column; gap: 8px; padding: var(--rds-space-4);
  border-radius: var(--rds-radius-md); border: 1px solid var(--rds-color-border-default);
  background: var(--rds-color-surface-card); cursor: pointer; text-decoration: none; color: inherit;
  transition: all var(--rds-motion-fast);
}
.ql:hover { border-color: var(--rds-accent); transform: translateY(-2px); box-shadow: var(--rds-shadow-sm); }
.ql .ql-arrow { color: var(--rds-accent); }
.ql h4 { font-size: 14.5px; font-weight: 600; color: var(--rds-color-text-primary); }
.ql p { font-size: 12.5px; color: var(--rds-color-text-muted); }

/* ---------- CTA band ---------- */
.cta-band { margin-top: var(--rds-space-9); background: var(--rds-color-text-primary); color: var(--rds-color-background-default); border-radius: var(--rds-radius-xl); padding: var(--rds-space-8); position: relative; overflow: hidden; }
.cta-band h2 { font-family: var(--rds-font-display); font-weight: 600; font-size: clamp(26px, 3.5vw, 38px); letter-spacing: -0.02em; max-width: 18ch; margin-bottom: var(--rds-space-3); color: var(--rds-color-background-default); }
.cta-band p { color: color-mix(in srgb, var(--rds-color-background-default) 70%, transparent); max-width: 50ch; }
.cta-band .grid-deco { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 28px 28px; pointer-events: none; }
.cta-band .rds-btn--secondary { background: var(--rds-color-background-default); color: var(--rds-color-text-primary); border-color: transparent; }

/* ---------- Misc ---------- */
.tag { display: inline-flex; align-items: center; font-family: var(--rds-font-mono); font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--rds-color-surface-sunken); color: var(--rds-color-text-secondary); border: 1px solid var(--rds-color-border-default); }
.future-note { display: flex; gap: 10px; align-items: center; font-size: 13px; color: var(--rds-color-text-muted); font-style: italic; margin-top: var(--rds-space-4); }
.divider { height: 1px; background: var(--rds-color-border-default); margin: var(--rds-space-7) 0; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--rds-color-text-primary); color: var(--rds-color-background-default); padding: 11px 20px; border-radius: 999px; font-size: 14px; font-weight: 500; box-shadow: var(--rds-shadow-lg); opacity: 0; pointer-events: none; transition: all var(--rds-motion-base); z-index: 100; display: flex; align-items: center; gap: 9px; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.muted-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: var(--rds-space-4); }
.scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 35; }

/* ===== Keyboard accessibility: global focus-visible ===== */
a:focus-visible, button:focus-visible, input:focus-visible, [tabindex]:focus-visible, .nav-link:focus-visible, .ql:focus-visible, .comp-card:focus-visible {
  outline: none; box-shadow: 0 0 0 2px var(--rds-color-background-default), 0 0 0 4px var(--rds-focus-ring); border-radius: var(--rds-radius-sm);
}

/* ===== Version badges in shell ===== */
.ver-badges { display: flex; align-items: center; gap: 7px; padding: 0 var(--rds-space-5) var(--rds-space-4); }
.ver-pill { font-family: var(--rds-font-mono); font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 5px; letter-spacing: 0.03em; }
.ver-pill.v { background: var(--rds-accent); color: #fff; }
.ver-pill.phase { background: var(--rds-color-surface-card); color: var(--rds-color-text-secondary); border: 1px solid var(--rds-color-border-strong); }

/* ===== Sidebar search ===== */
.nav-search { padding: 0 var(--rds-space-5) var(--rds-space-3); position: relative; }
.nav-search input {
  width: 100%; font-family: var(--rds-font-body); font-size: 13.5px;
  padding: 9px 12px 9px 32px; border-radius: var(--rds-radius-md);
  background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default);
  color: var(--rds-color-text-primary); transition: border-color var(--rds-motion-fast);
}
.nav-search input::placeholder { color: var(--rds-color-text-muted); }
.nav-search input:focus { outline: none; border-color: var(--rds-accent); }
.nav-search .s-icon { position: absolute; left: calc(var(--rds-space-5) + 11px); top: 50%; transform: translateY(-50%); color: var(--rds-color-text-muted); pointer-events: none; }
.nav-search .s-kbd { position: absolute; right: calc(var(--rds-space-5) + 9px); top: 50%; transform: translateY(-50%); font-family: var(--rds-font-mono); font-size: 10px; color: var(--rds-color-text-muted); border: 1px solid var(--rds-color-border-default); border-radius: 4px; padding: 1px 5px; pointer-events: none; }
.nav-link.hidden-search { display: none; }
.nav-group.hidden-search { display: none; }
.nav-soon { margin-left: auto; font-family: var(--rds-font-mono); font-size: 9px; color: var(--rds-color-text-muted); border: 1px solid var(--rds-color-border-default); border-radius: 4px; padding: 1px 5px; letter-spacing: 0.03em; }
.nav-empty { padding: 8px var(--rds-space-5); font-size: 13px; color: var(--rds-color-text-muted); font-style: italic; }

/* ===== Hero preview board (mini design-system board) ===== */
.hero-layout { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: var(--rds-space-7); align-items: center; }
.preview-board {
  position: relative; background: var(--rds-color-surface-raised);
  border: 1px solid var(--rds-color-border-strong); border-radius: var(--rds-radius-lg);
  padding: var(--rds-space-5); box-shadow: var(--rds-shadow-md);
  background-image: radial-gradient(var(--rds-grid-line) 1.3px, transparent 1.3px); background-size: 16px 16px;
  display: flex; flex-direction: column; gap: var(--rds-space-3);
}
.preview-board::before { content: "design decisions"; position: absolute; top: -10px; left: 18px; background: var(--rds-color-text-primary); color: var(--rds-color-background-default); font-family: var(--rds-font-mono); font-size: 10px; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 5px; text-transform: uppercase; }
.pb-item { background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-md); padding: 12px 14px; position: relative; border-left: 3px solid var(--rds-accent); }
.pb-item.olive { border-left-color: var(--rds-olive); }
.pb-item.amber { border-left-color: var(--rds-focus-ring); }
.pb-tag { font-family: var(--rds-font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-bottom: 7px; }
.pb-tag.token { background: color-mix(in srgb, var(--rds-accent) 14%, transparent); color: var(--rds-accent); }
.pb-tag.comp { background: color-mix(in srgb, var(--rds-olive) 18%, transparent); color: var(--rds-olive); }
.pb-tag.a11y { background: color-mix(in srgb, var(--rds-focus-ring) 18%, transparent); color: var(--rds-focus-ring); }
.pb-tag.rule { background: var(--rds-color-surface-sunken); color: var(--rds-color-text-secondary); border: 1px solid var(--rds-color-border-default); }
.pb-item code { font-family: var(--rds-font-mono); font-size: 12px; color: var(--rds-color-text-primary); font-weight: 600; }
.pb-item p { font-size: 12px; color: var(--rds-color-text-secondary); margin-top: 3px; line-height: 1.45; }
.pb-btn-demo { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.hero-nofake { display: inline-flex; align-items: center; gap: 8px; margin-top: var(--rds-space-5); font-size: 13px; color: var(--rds-color-text-muted); font-family: var(--rds-font-mono); }

/* ===== Action cards (Use RDS today) ===== */
.action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--rds-space-4); }
.action-card { display: flex; flex-direction: column; gap: 10px; background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-lg); padding: var(--rds-space-5); cursor: pointer; text-decoration: none; color: inherit; transition: border-color var(--rds-motion-fast), transform var(--rds-motion-fast), box-shadow var(--rds-motion-fast); position: relative; overflow: hidden; }
.action-card::after { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--rds-accent); transform: scaleY(0); transform-origin: top; transition: transform var(--rds-motion-base); }
.action-card:hover { border-color: var(--rds-color-border-strong); transform: translateY(-2px); box-shadow: var(--rds-shadow-md); }
.action-card:hover::after { transform: scaleY(1); }
.action-num { font-family: var(--rds-font-mono); font-size: 12px; color: var(--rds-accent); font-weight: 600; }
.action-card h3 { font-family: var(--rds-font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.action-card p { font-size: 13.5px; line-height: 1.5; flex: 1; }
.action-link { font-size: 13px; font-weight: 600; color: var(--rds-accent); display: inline-flex; align-items: center; gap: 6px; }

/* ===== Decision board (RDS in action) ===== */
.decision-board { display: grid; grid-template-columns: 1fr 1fr; gap: var(--rds-space-6); align-items: stretch; }
.db-ui { background: var(--rds-color-surface-raised); border: 1px solid var(--rds-color-border-strong); border-radius: var(--rds-radius-lg); padding: var(--rds-space-6); box-shadow: var(--rds-shadow-md); display: flex; flex-direction: column; gap: var(--rds-space-4); position: relative; }
.db-ui h4 { font-family: var(--rds-font-display); font-size: 19px; font-weight: 600; }
.db-ui .db-desc { font-size: 13.5px; color: var(--rds-color-text-secondary); }
.db-field label { font-size: 12.5px; font-weight: 600; color: var(--rds-color-text-primary); display: block; margin-bottom: 6px; }
.db-field input { width: 100%; padding: 10px 12px; border: 1px solid var(--rds-color-border-strong); border-radius: var(--rds-radius-md); background: var(--rds-color-surface-card); color: var(--rds-color-text-primary); font-family: var(--rds-font-body); font-size: 14px; transition: border-color var(--rds-motion-fast), box-shadow var(--rds-motion-fast); }
.db-field input:focus { outline: none; border-color: var(--rds-accent); box-shadow: 0 0 0 3px var(--rds-focus-ring); }
.db-helper { font-size: 12px; color: var(--rds-color-text-muted); margin-top: 6px; }
.db-error { font-size: 12px; color: var(--rds-color-danger); margin-top: 6px; display: flex; align-items: center; gap: 6px; }
.db-actions { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
.db-annotations { display: flex; flex-direction: column; gap: 8px; }
.db-anno { display: flex; gap: 12px; align-items: flex-start; padding: 11px 14px; background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-md); border-left: 3px solid var(--rds-olive); }
.db-anno .da-label { font-family: var(--rds-font-mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--rds-color-text-muted); min-width: 78px; flex-shrink: 0; padding-top: 2px; }
.db-anno code { font-family: var(--rds-font-mono); font-size: 12px; color: var(--rds-accent); font-weight: 600; }
.db-anno .da-rule { font-size: 13px; color: var(--rds-color-text-primary); }

/* ===== Token category tabs ===== */
.token-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: var(--rds-space-5); border-bottom: 1px solid var(--rds-color-border-default); padding-bottom: var(--rds-space-3); }
.token-tab { font-family: var(--rds-font-body); font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 999px; border: 1px solid var(--rds-color-border-default); background: var(--rds-color-surface-card); color: var(--rds-color-text-secondary); cursor: pointer; transition: all var(--rds-motion-fast); }
.token-tab:hover { border-color: var(--rds-color-border-strong); color: var(--rds-color-text-primary); }
.token-tab.active { background: var(--rds-accent); color: #fff; border-color: var(--rds-accent); }
.token-card.cat-hidden { display: none; }
.token-example { font-family: var(--rds-font-mono); font-size: 11px; color: var(--rds-color-text-muted); background: var(--rds-color-surface-sunken); padding: 5px 8px; border-radius: 5px; border: 1px solid var(--rds-color-border-default); margin-top: 2px; word-break: break-all; }

/* ===== Token-to-component diagram ===== */
.t2c { display: grid; grid-template-columns: 1fr 1fr; gap: var(--rds-space-6); align-items: center; }
.t2c-stage { background: var(--rds-color-surface-sunken); border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-lg); min-height: 230px; display: flex; align-items: center; justify-content: center; position: relative; background-image: radial-gradient(var(--rds-grid-line) 1.4px, transparent 1.4px); background-size: 18px 18px; }
.t2c-map { display: flex; flex-direction: column; gap: 8px; }
.t2c-row { display: flex; gap: 12px; align-items: center; padding: 10px 13px; background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-md); }
.t2c-part { font-size: 13px; font-weight: 600; color: var(--rds-color-text-primary); min-width: 92px; }
.t2c-row code { font-family: var(--rds-font-mono); font-size: 12px; color: var(--rds-accent); }

/* ===== Good / weak pattern frames ===== */
.gw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--rds-space-4); }
.gw-frame { border-radius: var(--rds-radius-lg); border: 1px solid var(--rds-color-border-default); padding: var(--rds-space-5); display: flex; flex-direction: column; gap: var(--rds-space-3); }
.gw-frame.good { border-left: 3px solid var(--rds-color-success); background: var(--rds-color-surface-card); }
.gw-frame.weak { border-left: 3px solid var(--rds-color-danger); background: var(--rds-color-surface-sunken); }
.gw-label { font-family: var(--rds-font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 7px; }
.gw-frame.good .gw-label { color: var(--rds-color-success); }
.gw-frame.weak .gw-label { color: var(--rds-color-danger); }
.gw-demo { padding: var(--rds-space-4) 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; min-height: 60px; }
.gw-frame p { font-size: 13px; }
.gw-pair { display: grid; gap: var(--rds-space-4); margin-bottom: var(--rds-space-5); }
.gw-pair-title { font-family: var(--rds-font-mono); font-size: 12px; color: var(--rds-color-text-muted); margin-bottom: var(--rds-space-2); letter-spacing: 0.04em; }

/* ===== Prompt cards (Use RDS with AI) ===== */
.prompt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--rds-space-4); }
.prompt-card { background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-lg); overflow: hidden; display: flex; flex-direction: column; }
.prompt-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: var(--rds-space-4) var(--rds-space-5); border-bottom: 1px solid var(--rds-color-border-default); }
.prompt-head h4 { font-family: var(--rds-font-display); font-size: 16px; font-weight: 600; }
.prompt-body { padding: var(--rds-space-4) var(--rds-space-5); flex: 1; }
.prompt-body p { font-family: var(--rds-font-mono); font-size: 12.5px; line-height: 1.65; color: var(--rds-color-text-secondary); }

/* ===== Contribution cards ===== */
.contrib-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--rds-space-3); }
.contrib-chip { display: flex; align-items: center; gap: 10px; padding: 13px var(--rds-space-4); background: var(--rds-color-surface-card); border: 1px solid var(--rds-color-border-default); border-radius: var(--rds-radius-md); font-size: 14px; color: var(--rds-color-text-primary); font-weight: 500; }
.contrib-chip .cc-dot { width: 7px; height: 7px; border-radius: 2px; background: var(--rds-olive); flex-shrink: 0; }

/* ===== Roadmap stage labels ===== */
.rm-stage { font-family: var(--rds-font-mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 9px; border-radius: 5px; }
.rm-stage.now { background: var(--rds-accent); color: #fff; }
.rm-stage.next { background: color-mix(in srgb, var(--rds-olive) 22%, transparent); color: var(--rds-olive); }
.rm-stage.later { background: var(--rds-color-surface-sunken); color: var(--rds-color-text-secondary); border: 1px solid var(--rds-color-border-default); }
.rm-stage.future { background: var(--rds-color-surface-sunken); color: var(--rds-color-text-muted); border: 1px solid var(--rds-color-border-default); }
.rm-why { font-size: 13.5px; color: var(--rds-color-text-secondary); font-style: italic; margin: 8px 0 var(--rds-space-3); padding-left: var(--rds-space-3); border-left: 2px solid var(--rds-color-border-strong); }
.rm-focus { font-size: 14px; color: var(--rds-color-text-primary); margin-bottom: 6px; }

/* ===== Changelog filters + impact ===== */
.cl-filters { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: var(--rds-space-5); }
.cl-filter { font-family: var(--rds-font-body); font-size: 13px; font-weight: 500; padding: 6px 13px; border-radius: 999px; border: 1px solid var(--rds-color-border-default); background: var(--rds-color-surface-card); color: var(--rds-color-text-secondary); cursor: pointer; transition: all var(--rds-motion-fast); }
.cl-filter:hover { border-color: var(--rds-color-border-strong); }
.cl-filter.active { background: var(--rds-color-text-primary); color: var(--rds-color-background-default); border-color: var(--rds-color-text-primary); }
.cl-change.filtered-out { display: none; }
.cl-impact { font-size: 13px; color: var(--rds-color-text-muted); margin-top: 4px; padding-left: 90px; }
.cl-impact b { color: var(--rds-color-text-secondary); font-weight: 600; }
@media (max-width: 900px) { .cl-impact { padding-left: 0; } }

/* ===== Maturity row on component cards ===== */
.comp-maturity { display: flex; flex-direction: column; gap: 5px; padding-top: 4px; border-top: 1px dashed var(--rds-color-border-default); margin-top: 2px; }
.comp-mat-row { display: flex; justify-content: space-between; font-size: 11.5px; }
.comp-mat-row .mk { color: var(--rds-color-text-muted); font-family: var(--rds-font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; }
.comp-mat-row .mv { color: var(--rds-color-text-secondary); font-weight: 500; }
.comp-card .comp-hover-reveal { max-height: 0; overflow: hidden; opacity: 0; transition: max-height var(--rds-motion-base), opacity var(--rds-motion-base), margin var(--rds-motion-base); }
.comp-card.soon:hover .comp-hover-reveal, .comp-card.soon:focus-within .comp-hover-reveal { max-height: 160px; opacity: 1; margin-top: 4px; }
.comp-hover-reveal .hr-title { font-family: var(--rds-font-mono); font-size: 10px; color: var(--rds-olive); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

/* ===== Responsive ---------- */
@media (max-width: 900px) {
  .sidebar { position: fixed; transform: translateX(-100%); box-shadow: var(--rds-shadow-lg); }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: inline-flex; }
  .scrim.show { display: block; }
  .grid-3, .grid-4, .quicklinks { grid-template-columns: repeat(2, 1fr); }
  .compare, .anatomy, .grid-2 { grid-template-columns: 1fr; }
  .state-grid { grid-template-columns: 1fr; }
  .rm-list { grid-template-columns: 1fr; }
  .cl-entry { grid-template-columns: 1fr; gap: var(--rds-space-3); }
  .hero-layout { grid-template-columns: 1fr; }
  .action-grid { grid-template-columns: repeat(2, 1fr); }
  .decision-board, .t2c, .gw-grid, .prompt-grid, .contrib-grid { grid-template-columns: 1fr; }
  .content { padding: var(--rds-space-6) var(--rds-space-4) var(--rds-space-8); }
}
@media (max-width: 560px) {
  .grid-3, .grid-4, .quicklinks, .action-grid { grid-template-columns: 1fr; }
  body { background-size: 24px 24px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  html { scroll-behavior: auto; }
}

</head>
<body>
<div id="app-root"></div>
<div class="toast" id="toast"></div>
<script>
/* ============================================================
   RDS — Riye Design System  ·  app shell + pages
   ============================================================ */

const I = {
  arrow: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  copy: '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 11V4a1 1 0 011-1h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',
  check: '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  checkW: '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  plus: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
  dash: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10" stroke="var(--rds-color-text-muted)" stroke-width="1.5" stroke-linecap="round"/></svg>',
  tick: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 5" stroke="var(--rds-accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  sun: '<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.2" stroke="currentColor" stroke-width="1.3"/><path d="M8 1v1.5M8 13.5V15M15 8h-1.5M2.5 8H1M12.7 3.3l-1 1M4.3 11.7l-1 1M12.7 12.7l-1-1M4.3 4.3l-1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',
  moon: '<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.5 9.5A5.5 5.5 0 016.5 2.5 5.5 5.5 0 1013.5 9.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>',
  x: '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="var(--rds-color-danger)" stroke-width="1.5" stroke-linecap="round"/></svg>',
  menu: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 5h14M2 9h14M2 13h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
  search: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
  spark: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.4 4.2L13.6 6 9.4 7.4 8 11.6 6.6 7.4 2.4 6l4.2-.8L8 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>',
};

const PAGES = [
  { group: null, items: [
    { id: "overview", label: "Overview" },
    { id: "getting-started", label: "Getting Started" },
  ]},
  { group: "Foundations", items: [
    { id: "foundations", label: "Foundations" },
    { id: "design-tokens", label: "Design Tokens" },
  ]},
  { group: "Components", items: [
    { id: "components", label: "All Components" },
    { id: "button", label: "Button", sub: true },
    { id: "components", label: "Input", sub: true, soon: true, alias: true },
    { id: "components", label: "Card", sub: true, soon: true, alias: true },
    { id: "components", label: "Modal", sub: true, soon: true, alias: true },
    { id: "components", label: "Form Field", sub: true, soon: true, alias: true },
  ]},
  { group: "Quality", items: [
    { id: "accessibility", label: "Accessibility" },
  ]},
  { group: "Guides", items: [
    { id: "use-with-ai", label: "Use RDS with AI" },
    { id: "contributing", label: "Contribution Guide" },
    { id: "roadmap", label: "Roadmap" },
    { id: "changelog", label: "Changelog" },
  ]},
];

const LABELS = {
  overview: "Overview", "getting-started": "Getting Started",
  foundations: "Foundations", "design-tokens": "Design Tokens",
  components: "Components", button: "Button", accessibility: "Accessibility",
  "use-with-ai": "Use RDS with AI", contributing: "Contribution Guide",
  roadmap: "Roadmap", changelog: "Changelog",
};

function buildShell() {
  const nav = PAGES.map(g => `
    <div class="nav-group" data-navgroup>
      ${g.group ? `<div class="nav-group-label">${g.group}</div>` : ''}
      ${g.items.map(i => `
        <a class="nav-link ${i.sub ? 'sub' : ''}" data-nav="${i.id}" data-label="${i.label.toLowerCase()}" tabindex="0">
          <span class="nav-dot"></span>${i.label}
          ${i.soon ? '<span class="nav-soon">soon</span>' : ''}
        </a>`).join('')}
    </div>`).join('');

  document.getElementById('app-root').innerHTML = `
    <div class="scrim" id="scrim"></div>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <a class="brand" data-nav="overview">
          <div class="brand-mark"><span></span><span></span><span></span><span></span></div>
          <div>
            <div class="brand-name">RDS</div>
            <div class="brand-sub">Riye Design System</div>
          </div>
        </a>
        <div class="ver-badges">
          <span class="ver-pill v">v0.1</span>
          <span class="ver-pill phase">Phase 1</span>
        </div>
        <div class="nav-search">
          <span class="s-icon">${I.search}</span>
          <input type="text" id="navSearch" placeholder="Search documentation" aria-label="Search documentation">
          <span class="s-kbd">/</span>
        </div>
        <div id="navList">${nav}</div>
      </aside>
      <div class="main">
        <div class="topbar">
          <div class="topbar-left">
            <button class="menu-btn" id="menuBtn" aria-label="Open navigation">${I.menu}</button>
            <div class="crumb">RDS / <b id="crumb">Overview</b></div>
          </div>
          <div class="topbar-right">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle colour theme">
              <span id="themeIcon">${I.moon}</span><span id="themeLabel">Dark</span>
            </button>
          </div>
        </div>
        <div class="content" id="content"></div>
      </div>
    </div>`;
}

/* ---- helpers ---- */
function tokenCard(t) {
  return `
  <div class="token-card" data-cat="${t.cat||'all'}">
    <div class="token-swatch ${t.swatchClass||''}" style="${t.swatchStyle||''}">${t.swatchInner||''}</div>
    <div class="token-body">
      <div class="token-name">
        <code>${t.name}</code>
        <button class="copy-btn" data-copy="${t.name}" aria-label="Copy ${t.name}">${I.copy}<span>Copy</span></button>
      </div>
      ${t.value ? `<span class="token-value-pill">${t.value}</span>` : ''}
      <div class="token-meta"><b>Purpose.</b> ${t.purpose}</div>
      <div class="token-meta"><b>Usage.</b> ${t.usage}</div>
      ${t.example ? `<div class="token-example">${t.example}</div>` : ''}
      ${t.theme ? `<div class="theme-tag"><span class="dot"></span>${t.theme}</div>` : ''}
    </div>
  </div>`;
}

/* ---- theme ---- */
function initTheme() {
  const html = document.documentElement;
  document.getElementById('themeToggle').addEventListener('click', () => {
    const dark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', dark ? 'light' : 'dark');
    document.getElementById('themeIcon').innerHTML = dark ? I.moon : I.sun;
    document.getElementById('themeLabel').textContent = dark ? 'Dark' : 'Light';
  });
}

/* ---- toast ---- */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = `${I.check} ${msg}`;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1700);
}

/* ---- routing ---- */
function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + id));
  document.querySelectorAll('.nav-link').forEach(l => {
    // active only for the canonical (non-alias) link of this id
    const isMatch = l.dataset.nav === id && !l.classList.contains('sub') ||
                    (l.dataset.nav === id && l.getAttribute('data-label') === (LABELS[id]||'').toLowerCase());
    l.classList.toggle('active', isMatch);
  });
  // ensure at least the first matching link is active
  if (!document.querySelector('.nav-link.active')) {
    const first = document.querySelector(`.nav-link[data-nav="${id}"]`);
    if (first) first.classList.add('active');
  }
  document.getElementById('crumb').textContent = LABELS[id] || 'Overview';
  document.getElementById('content').scrollTo?.(0, 0);
  window.scrollTo(0, 0);
  closeSidebar();
  history.replaceState(null, '', '#' + id);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
}

function filterNav(q) {
  q = q.trim().toLowerCase();
  const links = document.querySelectorAll('#navList .nav-link');
  let anyVisible = false;
  links.forEach(l => {
    const match = !q || l.getAttribute('data-label').includes(q);
    l.classList.toggle('hidden-search', !match);
    if (match) anyVisible = true;
  });
  // hide group labels whose links are all hidden
  document.querySelectorAll('#navList .nav-group').forEach(g => {
    const visible = [...g.querySelectorAll('.nav-link')].some(l => !l.classList.contains('hidden-search'));
    g.classList.toggle('hidden-search', !visible);
  });
  let empty = document.getElementById('navEmpty');
  if (!anyVisible) {
    if (!empty) {
      empty = document.createElement('div');
      empty.id = 'navEmpty'; empty.className = 'nav-empty';
      empty.textContent = 'No matching pages';
      document.getElementById('navList').appendChild(empty);
    }
  } else if (empty) { empty.remove(); }
}

function wireEvents() {
  document.body.addEventListener('click', (e) => {
    const nav = e.target.closest('[data-nav]');
    if (nav) { e.preventDefault(); go(nav.dataset.nav); return; }

    const copy = e.target.closest('[data-copy]');
    if (copy) {
      const val = copy.dataset.copy;
      const msg = copy.dataset.toast || 'Token copied';
      navigator.clipboard?.writeText(val).catch(()=>{});
      copy.classList.add('copied');
      const span = copy.querySelector('span'); const orig = span ? span.textContent : '';
      if (span) span.textContent = 'Copied';
      showToast(msg);
      setTimeout(() => { copy.classList.remove('copied'); if (span) span.textContent = orig || 'Copy'; }, 1500);
      return;
    }

    const chk = e.target.closest('.checklist li');
    if (chk) { chk.classList.toggle('checked'); return; }

    const loadBtn = e.target.closest('[data-loading]');
    if (loadBtn && !loadBtn.classList.contains('is-loading')) {
      const orig = loadBtn.innerHTML;
      loadBtn.classList.add('is-loading');
      loadBtn.setAttribute('aria-busy', 'true');
      loadBtn.innerHTML = '<span class="spinner"></span> Saving';
      setTimeout(() => { loadBtn.innerHTML = orig; loadBtn.classList.remove('is-loading'); loadBtn.removeAttribute('aria-busy'); }, 1600);
      return;
    }

    // token category tabs
    const tab = e.target.closest('.token-tab');
    if (tab) {
      const cat = tab.dataset.cat;
      document.querySelectorAll('.token-tab').forEach(t => t.classList.toggle('active', t === tab));
      document.querySelectorAll('#tokenGrid .token-card').forEach(c => {
        c.classList.toggle('cat-hidden', cat !== 'all' && c.dataset.cat !== cat);
      });
      return;
    }

    // changelog filters
    const clf = e.target.closest('.cl-filter');
    if (clf) {
      const type = clf.dataset.type;
      document.querySelectorAll('.cl-filter').forEach(f => f.classList.toggle('active', f === clf));
      document.querySelectorAll('.cl-change').forEach(c => {
        c.classList.toggle('filtered-out', type !== 'all' && c.dataset.type !== type);
      });
      return;
    }
  });

  // keyboard: Enter/Space on nav links + Enter activates focused nav
  document.body.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && e.target.classList && e.target.classList.contains('nav-link')) {
      e.preventDefault(); go(e.target.dataset.nav);
    }
    // "/" focuses search
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault(); document.getElementById('navSearch')?.focus();
    }
  });

  const search = document.getElementById('navSearch');
  if (search) search.addEventListener('input', (e) => filterNav(e.target.value));

  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('scrim').classList.add('show');
  });
  document.getElementById('scrim').addEventListener('click', closeSidebar);
}

      ['Structure','Truncation','Separators','Active states','Accessibility']],
    ['Avatar','soon','Visual representation of a person or entity. Future documentation will include sizing, fallbacks, grouping, status indicators, and accessibility guidance.',
      ['Sizing','Fallbacks','Grouping','Status indicators','Accessibility']],
  ];

  const availablePreview = `
    <span class="rds-btn rds-btn--primary sm">Primary</span>
    <span class="rds-btn rds-btn--secondary sm">Secondary</span>
    <span class="rds-btn rds-btn--ghost sm">Ghost</span>`;

  // stage mapping: most planned components are v1.0; more complex ones v2.0
  const stageV2 = ['Tooltip','Toast','Table','Accordion','Breadcrumb','Avatar','Select'];
  const stageFor = (name, isAvail) => isAvail ? 'v0.1' : (stageV2.includes(name) ? 'v2.0' : 'v1.0');
  const maturityFor = (isAvail) => isAvail ? 'Complete for Phase 1' : 'Planned';

  const card = ([name, status, desc, std]) => {
    const isAvail = status === 'available';
    const preview = isAvail ? availablePreview : (PV[name] || '');
    return `
    <div class="comp-card ${isAvail ? 'available' : 'soon'}" ${isAvail ? 'data-nav="button" tabindex="0"' : 'tabindex="0"'}>
      <div class="comp-head">
        <h3>${name}</h3>
        ${isAvail
          ? `<span class="comp-status available"><span class="pdot"></span>Available</span>`
          : `<span class="comp-status soon">Coming soon</span>`}
      </div>
      <div class="comp-preview">${preview}</div>
      <p class="comp-desc">${desc}</p>
      <div class="comp-maturity">
        <div class="comp-mat-row"><span class="mk">Documentation</span><span class="mv">${maturityFor(isAvail)}</span></div>
        <div class="comp-mat-row"><span class="mk">Stage</span><span class="mv">${stageFor(name, isAvail)}</span></div>
      </div>
      ${isAvail
        ? `<div class="comp-std">${std.map(s => `<span class="std-chip">${s}</span>`).join('')}</div><span class="comp-link">View documentation ${I.arrow}</span>`
        : `<div class="comp-hover-reveal"><div class="hr-title">Documentation will include</div><div class="comp-std">${std.map(s => `<span class="std-chip">${s}</span>`).join('')}</div></div>`}
    </div>`;
  };

  const availableCount = library.filter(c => c[1] === 'available').length;
  const soonCount = library.length - availableCount;

  return `
  <div class="page" id="page-components">
    <div class="eyebrow">Components</div>
    <h1 class="page-title">Documented decisions, not a dumping ground.</h1>
    <p class="lede">This is the planned RDS component library. Button is the first fully documented Phase 1 component. The rest of the architecture is mapped out here and will be documented with the same level of care, one credible component at a time.</p>

    <div class="card" style="margin-top:var(--rds-space-6);background:var(--rds-color-surface-card);border-left:2px solid var(--rds-accent)">
      <p style="font-family:var(--rds-font-serif);font-size:16.5px;line-height:1.55;color:var(--rds-color-text-primary);max-width:74ch">
        RDS will not ship shallow components just to look complete. Each component will be added with anatomy, states, accessibility guidance, token usage, and real product examples.
      </p>
    </div>

    <div style="display:flex;align-items:center;gap:var(--rds-space-4);margin-top:var(--rds-space-5);flex-wrap:wrap">
      <span class="comp-status available"><span class="pdot"></span>${availableCount} Available</span>
      <span class="comp-status soon">${soonCount} Coming soon</span>
      <span style="font-size:13px;color:var(--rds-color-text-muted);font-family:var(--rds-font-mono)">${library.length} components mapped</span>
    </div>

    <section class="section" style="margin-top:var(--rds-space-6)">
      <div class="eyebrow">Component library</div>
      <h2 class="section-title">One library. One standard.</h2>
      <p class="section-intro">Every card below commits to the same documentation standard, shown as chips. Available components link straight to their docs; planned components show exactly what their documentation will cover.</p>
      <div class="lib-grid">
        ${library.map(card).join('')}
      </div>
      <div class="future-note">${I.tick} The order reflects intent, not a rigid release sequence. Button ships first because actions are where hierarchy, states, and accessibility matter most.</div>
    </section>

    <div class="cta-band">
      <div class="grid-deco"></div>
      <h2>Start with the one component that is ready.</h2>
      <p>The Button page shows the standard every other component in this library will be held to.</p>
      <div class="btn-row"><a class="rds-btn rds-btn--secondary" data-nav="button">Open the Button docs ${I.arrow}</a></div>
    </div>
  </div>`;
}
